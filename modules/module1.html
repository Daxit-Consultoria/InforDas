<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Módulo 1 — Conhecendo o Computador</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    body { background: var(--bg); }

    /* Drag & Drop Puzzle */
    .computer-puzzle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 24px;
    }

    .puzzle-parts-bank {
      background: var(--bg);
      border-radius: var(--radius-md);
      padding: 20px;
      border: 2px dashed var(--border);
    }

    .puzzle-target {
      background: white;
      border-radius: var(--radius-md);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border-light);
    }

    .computer-silhouette {
      width: 100%;
      min-height: 360px;
      background: linear-gradient(180deg, #E8ECFF, #F0F4FF);
      border-radius: var(--radius-md);
      border: 2px solid var(--primary-light);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 8px;
      padding: 12px;
      position: relative;
    }

    .comp-monitor {
      background: #1E293B;
      border-radius: 8px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4ADE80;
      font-family: monospace;
      font-size: 13px;
      position: relative;
    }

    .comp-cpu-tower {
      background: #CBD5E1;
      border-radius: 6px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-muted);
    }

    .comp-peripherals {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .comp-keyboard-shape {
      background: #CBD5E1;
      border-radius: 4px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-muted);
    }

    .comp-mouse-shape {
      background: #CBD5E1;
      border-radius: 50% 50% 60% 60%;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Áreas de drop no computador */
    .comp-drop-zone {
      position: absolute;
      border: 2px dashed rgba(79,70,229,0.3);
      border-radius: 6px;
      background: rgba(79,70,229,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--primary);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .comp-drop-zone.drag-over {
      border-color: var(--primary);
      background: var(--primary-ultra-light);
    }

    .comp-drop-zone.correct {
      border-color: var(--success);
      border-style: solid;
      background: var(--success-light);
    }

    /* Partes do computador no banco */
    .part-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: white;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      cursor: grab;
      margin-bottom: 8px;
      transition: var(--transition);
      font-size: 14px;
      font-weight: 600;
      user-select: none;
    }

    .part-item:hover {
      border-color: var(--primary);
      background: var(--primary-ultra-light);
      transform: translateX(4px);
    }

    .part-item.dragging {
      opacity: 0.4;
      cursor: grabbing;
    }

    .part-item.used {
      opacity: 0.4;
      cursor: not-allowed;
      text-decoration: line-through;
    }
  </style>
</head>
<body>

  <!-- ===== NAVEGAÇÃO DO MÓDULO ===== -->
  <nav class="module-nav">
    <a href="../dashboard.html" style="font-size:22px; text-decoration:none;" title="Dashboard">🏠</a>
    <div class="module-nav-title">🖥️ Módulo 1 — Conhecendo o Computador</div>
    <div class="step-progress" id="step-progress"></div>
    <div class="step-label" id="step-label">Passo 1/5</div>
    <div class="xp-badge" style="font-size:13px;">⭐ <span id="nav-xp">0</span></div>
  </nav>

  <!-- ===== CONTEÚDO PRINCIPAL ===== -->
  <div class="module-container">
    <div id="step-content"></div>
  </div>

  <!-- ===== RODAPÉ DO MÓDULO ===== -->
  <div class="module-footer">
    <div class="module-footer-info">
      <span id="footer-step">Passo 1 de 5</span>
    </div>
    <div class="module-footer-actions">
      <button class="btn btn-ghost" id="btn-prev" onclick="prevStep()" style="display:none;">
        ← Anterior
      </button>
      <button class="btn btn-primary" id="btn-next" onclick="nextStep()">
        Próximo →
      </button>
    </div>
  </div>

  <!-- Botão de Ajuda -->
  <button class="help-fab" onclick="showHelp()" title="Como Fazer?">
    ❓
  </button>

  <!-- Modal de Ajuda -->
  <div class="modal-custom" id="help-modal">
    <div class="modal-box">
      <div class="modal-box-header">
        <h3 id="help-title">❓ Como Fazer?</h3>
        <button class="modal-close" onclick="closeHelp()">✕</button>
      </div>
      <div class="modal-box-body" id="help-body"></div>
      <div class="modal-box-footer">
        <button class="btn btn-primary" onclick="closeHelp()">Entendi! 👍</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script src="../js/app.js"></script>
  <script>
    // ===================================================
    // MÓDULO 1 — CONHECENDO O COMPUTADOR
    // ===================================================

    const MODULE_ID = 1;
    let currentStep = 0;
    let quizAnswers = {};
    let quizScore = 0;
    let stepUnlocked = false;
    let draggedItem = null;
    let droppedCount = 0;

    // Partes do computador para o Drag & Drop
    const COMPUTER_PARTS = [
      { id:'cpu',     name:'Processador (CPU)',     icon:'⚡', desc:'Cérebro do computador. Processa todas as informações.',    type:'internal' },
      { id:'ram',     name:'Memória RAM',           icon:'🧠', desc:'Memória temporária. Guarda o que está sendo usado agora.', type:'internal' },
      { id:'hd',      name:'HD / SSD',             icon:'💾', desc:'Armazena arquivos permanentemente.',                       type:'internal' },
      { id:'mobo',    name:'Placa-Mãe',            icon:'🔌', desc:'Liga e conecta todos os componentes.',                    type:'internal' },
      { id:'psu',     name:'Fonte de Alimentação', icon:'⚡', desc:'Fornece energia elétrica para o computador.',             type:'internal' },
      { id:'gpu',     name:'Placa de Vídeo',       icon:'🖼️', desc:'Processa gráficos e imagens.',                            type:'internal' },
      { id:'monitor', name:'Monitor',              icon:'🖥️', desc:'Exibe as imagens e informações.',                         type:'external' },
      { id:'keyboard',name:'Teclado',              icon:'⌨️', desc:'Permite digitar e enviar comandos.',                      type:'external' },
      { id:'mouse',   name:'Mouse',                icon:'🖱️', desc:'Controla o cursor na tela.',                              type:'external' },
      { id:'printer', name:'Impressora',           icon:'🖨️', desc:'Imprime documentos e imagens.',                           type:'external' },
      { id:'webcam',  name:'Webcam',               icon:'📷', desc:'Captura vídeo e imagens.',                                type:'external' },
      { id:'speaker', name:'Caixa de Som',         icon:'🔊', desc:'Reproduz sons e músicas.',                                type:'external' },
    ];

    // Perguntas do Quiz
    const QUIZ_QUESTIONS = [
      {
        question: 'O que é um computador?',
        options: [
          'Uma máquina que apenas toca músicas',
          'Uma máquina eletrônica que processa, armazena e exibe informações',
          'Um aparelho usado somente para jogar',
          'Um tipo de televisão com teclado',
        ],
        correct: 1,
        explanation: 'Um computador é uma máquina eletrônica que recebe, processa, armazena e exibe informações através de hardware e software.',
      },
      {
        question: 'O que é Hardware?',
        options: [
          'Programas e aplicativos instalados no computador',
          'A conexão com a internet',
          'A parte física do computador — tudo que você pode tocar',
          'O sistema operacional',
        ],
        correct: 2,
        explanation: 'Hardware é toda a parte física do computador: monitor, teclado, mouse, processador, memória RAM, etc. Tudo que você pode tocar!',
      },
      {
        question: 'Qual componente é considerado o "cérebro" do computador?',
        options: ['Memória RAM', 'Placa-Mãe', 'HD', 'Processador (CPU)'],
        correct: 3,
        explanation: 'O Processador (CPU - Central Processing Unit) é o "cérebro" do computador. Ele executa todos os cálculos e processa todas as informações.',
      },
      {
        question: 'Qual é a diferença entre HD e SSD?',
        options: [
          'Não há diferença, são a mesma coisa',
          'O SSD é mais lento e barato que o HD',
          'O HD usa partes mecânicas e o SSD usa memória flash (mais rápido)',
          'O HD é para armazenar músicas e o SSD para fotos',
        ],
        correct: 2,
        explanation: 'O HD (Hard Disk) usa partes mecânicas em movimento para gravar dados. O SSD (Solid State Drive) usa memória flash eletrônica, sendo muito mais rápido e silencioso.',
      },
      {
        question: 'O que é Software?',
        options: [
          'O teclado e o mouse do computador',
          'Os programas, aplicativos e o sistema operacional',
          'A memória RAM do computador',
          'O cabo que conecta o computador à tomada',
        ],
        correct: 1,
        explanation: 'Software são os programas e aplicativos — a parte "intangível" do computador. Exemplos: Windows, Word, Chrome, calculadora, jogos.',
      },
      {
        question: 'Qual a principal função da Placa-Mãe?',
        options: [
          'Ligar e interligar todos os componentes do computador',
          'Apenas fornecer energia elétrica',
          'Exibir imagens no monitor',
          'Reproduzir som',
        ],
        correct: 0,
        explanation: 'A placa-mãe (Motherboard) é a placa de circuito principal onde todos os outros componentes (CPU, RAM, Placa de Vídeo) se conectam.',
      },
      {
        question: 'O que acontece com os dados na Memória RAM quando você desliga o computador?',
        options: [
          'Ficam salvos para sempre',
          'São enviados para o monitor',
          'São apagados, pois a RAM é uma memória temporária',
          'São transformados em vírus',
        ],
        correct: 2,
        explanation: 'A memória RAM é volátil. Ela guarda dados temporariamente para uso rápido, mas apaga tudo ao desligar. Para salvar, usamos o HD/SSD.',
      },
      {
        question: 'O mouse é considerado um dispositivo de qual tipo?',
        options: [
          'De Entrada',
          'De Saída',
          'De Processamento',
          'De Armazenamento',
        ],
        correct: 0,
        explanation: 'O mouse é de entrada, pois você o utiliza para enviar comandos (cliques e movimentos) PARA o computador.',
      },
      {
        question: 'Qual dos itens abaixo é um dispositivo de SAÍDA?',
        options: [
          'Teclado',
          'Mouse',
          'Webcam',
          'Monitor',
        ],
        correct: 3,
        explanation: 'O monitor é de saída, pois ele recebe as informações processadas pelo computador e exibe PARA você.',
      },
      {
        question: 'O que faz a Fonte de Alimentação?',
        options: [
          'Armazena fotos e vídeos',
          'Fornece e distribui a energia elétrica adequada para o computador funcionar',
          'Mede a velocidade da internet',
          'Gela o computador',
        ],
        correct: 1,
        explanation: 'A Fonte converte a energia da tomada (110v/220v) na energia adequada e a distribui para todas as peças do PC.',
      }
    ];

    // ===================================================
    // RENDERIZAÇÃO DOS PASSOS
    // ===================================================

    const STEPS = [
      { title: '📖 O que é um Computador?',    render: renderStep1 },
      { title: '🔧 Hardware — Partes Internas', render: renderStep2 },
      { title: '🖱️ Hardware — Partes Externas', render: renderStep3 },
      { title: '🎮 Atividade: Identifique as Peças!', render: renderStep4 },
      { title: '✅ Quiz Final',                render: renderStep5 },
    ];

    // ===== PASSO 1: O QUE É UM COMPUTADOR ===== //
    function renderStep1() {
      return `
        <div class="module-section">
          <div class="module-section-hero">
            <div class="hero-badge">📖 Teoria — Passo 1 de 5</div>
            <h2>O que é um Computador?</h2>
            <p>Um computador é uma máquina eletrônica capaz de receber, processar, 
               armazenar e exibir informações de forma rápida e eficiente.</p>
          </div>

          <div class="concept-grid stagger">
            <div class="concept-card animate-fadeInUp">
              <div class="concept-icon blue">💻</div>
              <div class="concept-title">Computador</div>
              <div class="concept-desc">Máquina que processa informações. Pode ser desktop, notebook, tablet ou smartphone.</div>
            </div>
            <div class="concept-card animate-fadeInUp">
              <div class="concept-icon green">⚙️</div>
              <div class="concept-title">Hardware</div>
              <div class="concept-desc">Parte física — tudo que você pode tocar: monitor, teclado, processador, memória.</div>
            </div>
            <div class="concept-card animate-fadeInUp">
              <div class="concept-icon purple">💿</div>
              <div class="concept-title">Software</div>
              <div class="concept-desc">Programas e aplicativos — Windows, Word, Chrome, calculadora, jogos.</div>
            </div>
            <div class="concept-card animate-fadeInUp">
              <div class="concept-icon yellow">🪟</div>
              <div class="concept-title">Sistema Operacional</div>
              <div class="concept-desc">Programa principal que controla tudo: Windows, macOS, Linux, Android.</div>
            </div>
          </div>

          <div class="info-box tip">
            <div class="info-box-title">💡 Dica</div>
            <div class="info-box-body">
              Pense no computador como um ser humano: o <strong>Hardware</strong> é o corpo físico, 
              o <strong>Software</strong> são os pensamentos e conhecimentos, e o 
              <strong>Sistema Operacional</strong> é o cérebro que coordena tudo!
            </div>
          </div>

            <div style="text-align:center; margin-top:32px; padding:32px; background:white; border-radius:var(--radius-lg); box-shadow:var(--shadow);">
              <div style="font-size:80px; margin-bottom:16px; animation:float 3s ease-in-out infinite;">🖥️</div>
              <h3 style="font-size:20px; margin-bottom:8px;">Computador Completo</h3>
              <div style="display:flex; justify-content:center; gap:24px; flex-wrap:wrap; margin-top:16px;">
                <div style="text-align:center;">
                  <div style="font-size:32px;">⚙️</div>
                  <div style="font-size:12px; font-weight:600; color:var(--text-secondary);">Hardware</div>
                </div>
                <div style="font-size:24px; align-self:center; color:var(--primary);">+</div>
                <div style="text-align:center;">
                  <div style="font-size:32px;">💿</div>
                  <div style="font-size:12px; font-weight:600; color:var(--text-secondary);">Software</div>
                </div>
                <div style="font-size:24px; align-self:center; color:var(--primary);">=</div>
                <div style="text-align:center;">
                  <div style="font-size:32px;">🖥️</div>
                  <div style="font-size:12px; font-weight:600; color:var(--success);">Computador Funcionando!</div>
                </div>
              </div>
            </div>
          </div>
          ${!stepUnlocked ? `
            <div style="text-align:center; margin-top:32px;">
              <button class="btn btn-outline" onclick="this.style.display='none'; unlockNext();" style="border-width:2px; font-weight:bold;">✅ Marcar como lido e entendido</button>
            </div>
          ` : ''}
        </div>
      `;
    }

    // ===== PASSO 2: HARDWARE INTERNO ===== //
    function renderStep2() {
      const internalParts = COMPUTER_PARTS.filter(p => p.type === 'internal');
      return `
        <div class="module-section">
          <div class="module-section-hero" style="background:linear-gradient(135deg,#1E293B,#334155);">
            <div class="hero-badge">🔧 Hardware — Passo 2 de 5</div>
            <h2>Partes Internas do Computador</h2>
            <p>Esses são os componentes que ficam <strong>dentro do gabinete</strong>. 
               Você não os vê normalmente, mas são essenciais para o funcionamento!</p>
          </div>

          <div class="concept-grid stagger">
            ${internalParts.map(part => `
              <div class="concept-card animate-fadeInUp">
                <div class="concept-icon blue" style="font-size:28px;">${part.icon}</div>
                <div class="concept-title">${part.name}</div>
                <div class="concept-desc">${part.desc}</div>
              </div>
            `).join('')}
          </div>

          <div class="info-box success" style="margin-top:16px;">
            <div class="info-box-title">✅ Resumo Visual</div>
            <div class="info-box-body">
              <strong>CPU</strong> = processa | <strong>RAM</strong> = memória temporária | 
              <strong>HD/SSD</strong> = armazena | <strong>Placa-Mãe</strong> = conecta tudo | 
              <strong>Fonte</strong> = energia | <strong>Placa de Vídeo</strong> = gráficos
            </div>
          </div>
          ${!stepUnlocked ? `
            <div style="text-align:center; margin-top:32px;">
              <button class="btn btn-outline" onclick="this.style.display='none'; unlockNext();" style="border-width:2px; font-weight:bold;">✅ Marcar como lido e entendido</button>
            </div>
          ` : ''}
        </div>
      `;
    }

    // ===== PASSO 3: HARDWARE EXTERNO ===== //
    function renderStep3() {
      const externalParts = COMPUTER_PARTS.filter(p => p.type === 'external');
      return `
        <div class="module-section">
          <div class="module-section-hero" style="background:linear-gradient(135deg,#0F766E,#0D9488);">
            <div class="hero-badge">🖱️ Periféricos — Passo 3 de 5</div>
            <h2>Partes Externas — Periféricos</h2>
            <p>Periféricos são os dispositivos conectados <strong>externamente</strong> ao computador. 
               Eles permitem entrada e saída de informações!</p>
          </div>

          <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;">
            <div class="card">
              <div class="card-header">📥 Dispositivos de Entrada</div>
              <div class="card-body">
                <p style="font-size:14px; color:var(--text-secondary); margin-bottom:12px;">
                  Enviam informações <strong>para</strong> o computador
                </p>
                <div style="display:flex; flex-direction:column; gap:8px;">
                  ${[
                    {icon:'⌨️', name:'Teclado', desc:'Digita texto e comandos'},
                    {icon:'🖱️', name:'Mouse', desc:'Controla o cursor'},
                    {icon:'📷', name:'Webcam', desc:'Captura imagens e vídeos'},
                  ].map(p => `
                    <div style="display:flex; align-items:center; gap:10px; padding:10px; background:var(--bg); border-radius:var(--radius);">
                      <span style="font-size:24px;">${p.icon}</span>
                      <div>
                        <div style="font-weight:700; font-size:14px;">${p.name}</div>
                        <div style="font-size:12px; color:var(--text-secondary);">${p.desc}</div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">📤 Dispositivos de Saída</div>
              <div class="card-body">
                <p style="font-size:14px; color:var(--text-secondary); margin-bottom:12px;">
                  Recebem informações <strong>do</strong> computador
                </p>
                <div style="display:flex; flex-direction:column; gap:8px;">
                  ${[
                    {icon:'🖥️', name:'Monitor', desc:'Exibe imagens e texto'},
                    {icon:'🖨️', name:'Impressora', desc:'Imprime documentos'},
                    {icon:'🔊', name:'Caixa de Som', desc:'Reproduz áudio'},
                  ].map(p => `
                    <div style="display:flex; align-items:center; gap:10px; padding:10px; background:var(--bg); border-radius:var(--radius);">
                      <span style="font-size:24px;">${p.icon}</span>
                      <div>
                        <div style="font-weight:700; font-size:14px;">${p.name}</div>
                        <div style="font-size:12px; color:var(--text-secondary);">${p.desc}</div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
          </div>

          <div class="info-box tip">
            <div class="info-box-title">💡 Teclado e Mouse são Entrada!</div>
            <div class="info-box-body">
              Teclado e mouse são dispositivos de <strong>entrada</strong> porque você usa eles 
              para enviar informações AO computador. O monitor é de <strong>saída</strong> porque 
              o computador envia informações PARA você ver!
            </div>
          </div>
          ${!stepUnlocked ? `
            <div style="text-align:center; margin-top:32px;">
              <button class="btn btn-outline" onclick="this.style.display='none'; unlockNext();" style="border-width:2px; font-weight:bold;">✅ Marcar como lido e entendido</button>
            </div>
          ` : ''}
        </div>
      `;
    }

    // ===== PASSO 4: DRAG & DROP ATIVIDADE ===== //
    function renderStep4() {
      droppedCount = 0;
      return `
        <div class="module-section">
          <div class="module-section-hero" style="background:linear-gradient(135deg,#7C3AED,#6D28D9);">
            <div class="hero-badge">🎮 Atividade Prática — Passo 4 de 5</div>
            <h2>Identifique as Peças!</h2>
            <p>Arraste os nomes das peças para a coluna correta: 
               <strong>Interna</strong> (dentro do gabinete) ou <strong>Externa</strong> (periférico).</p>
          </div>

          <div id="activity-result" style="display:none; margin-bottom:16px;"></div>

          <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-top:24px;">
            <!-- Banco de peças -->
            <div>
              <h3 style="margin-bottom:12px; font-size:16px;">🎁 Peças para Classificar</h3>
              <div id="parts-bank" style="display:flex; flex-direction:column; gap:8px;">
                ${COMPUTER_PARTS.map(part => `
                  <div
                    class="part-item"
                    draggable="true"
                    id="part-${part.id}"
                    data-id="${part.id}"
                    data-type="${part.type}"
                    ondragstart="handleDragStart(event)"
                    ondragend="handleDragEnd(event)"
                  >
                    <span>${part.icon}</span>
                    <span>${part.name}</span>
                  </div>
                `).join('')}
              </div>
            </div>

            <!-- Coluna: Internas -->
            <div>
              <h3 style="margin-bottom:12px; font-size:16px; color:#3730A3;">⚙️ Partes Internas</h3>
              <div
                id="drop-internal"
                class="drop-zone"
                style="min-height:320px; flex-direction:column; gap:6px; align-items:flex-start; padding:12px;"
                ondragover="handleDragOver(event)"
                ondragleave="handleDragLeave(event)"
                ondrop="handleDrop(event,'internal')"
              >
                <span style="color:var(--text-muted); font-size:13px;">Solte aqui ↓</span>
              </div>
            </div>

            <!-- Coluna: Externas -->
            <div>
              <h3 style="margin-bottom:12px; font-size:16px; color:#065F46;">🖥️ Partes Externas</h3>
              <div
                id="drop-external"
                class="drop-zone"
                style="min-height:320px; flex-direction:column; gap:6px; align-items:flex-start; padding:12px;"
                ondragover="handleDragOver(event)"
                ondragleave="handleDragLeave(event)"
                ondrop="handleDrop(event,'external')"
              >
                <span style="color:var(--text-muted); font-size:13px;">Solte aqui ↓</span>
              </div>
            </div>
          </div>

          <div style="text-align:center; margin-top:16px;">
            <button class="btn btn-ghost" onclick="resetActivity()">🔄 Recomeçar</button>
          </div>
        </div>
      `;
    }

    // ===== PASSO 5: QUIZ ===== //
    function renderStep5() {
      const questionIndex = Object.keys(quizAnswers).length;
      const answered = questionIndex >= QUIZ_QUESTIONS.length;

      if (answered) {
        return renderQuizResult();
      }

      const q = QUIZ_QUESTIONS[questionIndex];
      const letters = ['A', 'B', 'C', 'D'];

      return `
        <div class="module-section">
          <div class="module-section-hero" style="background:linear-gradient(135deg,#059669,#047857);">
            <div class="hero-badge">✅ Quiz Final — Passo 5 de 5</div>
            <h2>Vamos Testar seu Conhecimento!</h2>
            <p>Responda as perguntas sobre o que você aprendeu.</p>
          </div>

          <div style="max-width:620px; margin:0 auto;">
            <div class="quiz-progress">
              <div class="quiz-progress-bar">
                <div class="quiz-progress-fill" style="width:${(questionIndex/QUIZ_QUESTIONS.length)*100}%"></div>
              </div>
              <span style="font-size:14px; font-weight:700; color:var(--text-secondary); white-space:nowrap;">
                ${questionIndex + 1} / ${QUIZ_QUESTIONS.length}
              </span>
            </div>

            <div class="card">
              <div class="card-body" style="padding:28px;">
                <div class="quiz-question">${q.question}</div>
                <div class="quiz-options" id="quiz-options">
                  ${q.options.map((opt, i) => `
                    <div
                      class="quiz-option"
                      id="option-${i}"
                      onclick="answerQuiz(${questionIndex}, ${i})"
                    >
                      <div class="quiz-letter">${letters[i]}</div>
                      <span>${opt}</span>
                    </div>
                  `).join('')}
                </div>

                <div class="quiz-feedback" id="quiz-feedback">
                  <span class="quiz-feedback-icon"></span>
                  <div class="quiz-feedback-text"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderQuizResult() {
      const pct = Math.round((quizScore / QUIZ_QUESTIONS.length) * 100);
      const stars = pct >= 80 ? 3 : pct >= 60 ? 2 : 1;
      const msg = pct >= 80 ? 'Excelente trabalho!' : pct >= 60 ? 'Muito bom!' : 'Continue praticando!';

      return `
        <div class="module-section" style="text-align:center;">
          <div class="card" style="max-width:500px; margin:40px auto; padding:40px 32px;">
            <div style="font-size:72px; margin-bottom:16px;">${pct >= 80 ? '🏆' : pct >= 60 ? '🌟' : '📚'}</div>
            <h2 style="font-size:26px; margin-bottom:8px;">${msg}</h2>
            <div style="font-size:48px; font-weight:900; font-family:var(--font-heading); color:var(--primary); margin:16px 0;">
              ${pct}%
            </div>
            <div style="color:var(--text-secondary); margin-bottom:20px;">
              Você acertou ${quizScore} de ${QUIZ_QUESTIONS.length} questões
            </div>
            <div class="stars-row">
              ${Array.from({length:3}, (_,i) => `
                <span class="star-item" style="color:${i<stars?'#F59E0B':'#E2E8F0'};">${i<stars?'⭐':'☆'}</span>
              `).join('')}
            </div>
            <div style="margin-top:24px;">
              <button class="btn btn-success btn-lg" onclick="finishModule()">
                🚀 Concluir Módulo! +50 XP
              </button>
            </div>
          </div>
        </div>
      `;
    }

    // ===================================================
    // LÓGICA DO QUIZ
    // ===================================================
    function answerQuiz(questionIndex, optionIndex) {
      const q = QUIZ_QUESTIONS[questionIndex];
      const options = document.querySelectorAll('.quiz-option');
      const feedback = document.getElementById('quiz-feedback');

      // Desabilita todas as opções
      options.forEach(opt => opt.classList.add('disabled'));

      const isCorrect = optionIndex === q.correct;
      quizAnswers[questionIndex] = { selected: optionIndex, correct: q.correct };

      if (isCorrect) {
        quizScore++;
        options[optionIndex].classList.add('correct');
        feedback.innerHTML = `
          <span class="quiz-feedback-icon">✅</span>
          <div class="quiz-feedback-text">
            <strong>Correto! 🎉</strong>
            <div style="margin-top:4px;">${q.explanation}</div>
          </div>
        `;
        feedback.className = 'quiz-feedback show correct';
        App.playSound('correct');
        App.showXPPopup(5, window.innerWidth/2, 200);
      } else {
        options[optionIndex].classList.add('incorrect');
        options[q.correct].classList.add('correct');
        feedback.innerHTML = `
          <span class="quiz-feedback-icon">❌</span>
          <div class="quiz-feedback-text">
            <strong>Não foi dessa vez!</strong>
            <div style="margin-top:4px;">A resposta correta é: <strong>${q.options[q.correct]}</strong>.<br>${q.explanation}</div>
          </div>
        `;
        feedback.className = 'quiz-feedback show incorrect';
        App.playSound('incorrect');
      }

      // Avança automaticamente para próxima questão
      setTimeout(() => {
        if (questionIndex + 1 >= QUIZ_QUESTIONS.length) {
          renderCurrentStep();
        } else {
          renderCurrentStep();
        }
      }, 2200);
    }

    // ===================================================
    // DRAG & DROP
    // ===================================================
    function handleDragStart(event) {
      draggedItem = event.target;
      event.target.classList.add('dragging');
      event.dataTransfer.setData('text/plain', event.target.dataset.id);
    }

    function handleDragEnd(event) {
      event.target.classList.remove('dragging');
    }

    function handleDragOver(event) {
      event.preventDefault();
      event.currentTarget.classList.add('drag-over');
    }

    function handleDragLeave(event) {
      event.currentTarget.classList.remove('drag-over');
    }

    function handleDrop(event, targetType) {
      event.preventDefault();
      event.currentTarget.classList.remove('drag-over');

      const partId = event.dataTransfer.getData('text/plain');
      const part = COMPUTER_PARTS.find(p => p.id === partId);
      const partEl = document.getElementById(`part-${partId}`);

      if (!part || !partEl || partEl.classList.contains('used')) return;

      const isCorrect = part.type === targetType;

      // Marca como usada no banco
      partEl.classList.add('used');

      // Cria elemento no drop zone
      const dropped = document.createElement('div');
      dropped.style.cssText = `
        display:flex; align-items:center; gap:8px;
        padding:8px 12px; border-radius:var(--radius);
        font-size:13px; font-weight:600; width:100%;
        animation: fadeInUp 0.3s ease;
      `;

      if (isCorrect) {
        dropped.style.background = 'var(--success-light)';
        dropped.style.color = 'var(--success-dark)';
        dropped.innerHTML = `<span>✅</span><span>${part.icon} ${part.name}</span>`;
        App.playSound('correct');
        droppedCount++;
      } else {
        dropped.style.background = 'var(--danger-light)';
        dropped.style.color = 'var(--danger-dark)';
        dropped.innerHTML = `<span>❌</span><span>${part.icon} ${part.name}</span>`;
        App.playSound('incorrect');
        droppedCount++;

        // Mostra dica
        App.showToast('warning', 'Atenção!', `${part.name} é um componente ${part.type === 'internal' ? 'INTERNO' : 'EXTERNO'}!`);
      }

      // Remove o hint "Solte aqui"
      const hint = event.currentTarget.querySelector('span');
      if (hint && hint.textContent.includes('Solte')) hint.remove();

      event.currentTarget.appendChild(dropped);

      // Se todos foram colocados
      if (droppedCount === COMPUTER_PARTS.length) {
        unlockNext();
        setTimeout(() => {
          document.getElementById('activity-result').style.display = 'block';
          document.getElementById('activity-result').innerHTML = `
            <div class="info-box success">
              <div class="info-box-title">🎉 Atividade Concluída!</div>
              <div class="info-box-body">Você classificou todas as peças! Clique em "Próximo" para ir ao Quiz.</div>
            </div>
          `;
          // Dá XP pela atividade
          App.completeStep(MODULE_ID, 3, 20);
        }, 500);
      }
    }

    function resetActivity() {
      droppedCount = 0;
      renderCurrentStep();
    }

    // ===================================================
    // NAVEGAÇÃO
    // ===================================================
    function renderCurrentStep() {
      const progress = App.getModuleProgress(MODULE_ID);
      stepUnlocked = currentStep < (progress.currentStep || 0);

      const content = document.getElementById('step-content');
      content.innerHTML = STEPS[currentStep].render();

      // Atualiza progress
      updateProgress();

      // Anima entrada
      content.querySelector('.module-section')?.classList.add('animate-fadeIn');
    }

    function unlockNext() {
      stepUnlocked = true;
      document.getElementById('btn-next').style.display = 'inline-flex';
      App.playSound('correct');
    }

    function updateProgress() {
      const progressEl = document.getElementById('step-progress');
      let html = '';
      STEPS.forEach((s, i) => {
        html += `<div class="step-dot ${i < currentStep ? 'done' : i === currentStep ? 'active' : 'pending'}"></div>`;
        if (i < STEPS.length - 1) html += `<div class="step-line ${i < currentStep ? 'done' : ''}"></div>`;
      });
      progressEl.innerHTML = html;

      document.getElementById('step-label').textContent = `Passo ${currentStep + 1}/${STEPS.length}`;
      document.getElementById('footer-step').textContent = `Passo ${currentStep + 1} de ${STEPS.length}: ${STEPS[currentStep].title}`;

      document.getElementById('btn-prev').style.display = currentStep > 0 ? 'inline-flex' : 'none';
      
      if (currentStep === STEPS.length - 1) {
        document.getElementById('btn-next').style.display = 'none';
      } else {
        document.getElementById('btn-next').style.display = stepUnlocked ? 'inline-flex' : 'none';
      }

      // Atualiza XP na nav
      const state = App.loadState();
      if (state) document.getElementById('nav-xp').textContent = state.totalXP || 0;
    }

    function nextStep() {
      if (currentStep < STEPS.length - 1) {
        // Dá XP por completar o passo (exceto quiz que tem XP próprio)
        if (currentStep < 3) {
          App.completeStep(MODULE_ID, currentStep, 10);
        }
        currentStep++;
        renderCurrentStep();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        App.playSound('click');
      }
    }

    function prevStep() {
      if (currentStep > 0) {
        currentStep--;
        renderCurrentStep();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function finishModule() {
      const pct = Math.round((quizScore / QUIZ_QUESTIONS.length) * 100);
      App.saveQuizScore(MODULE_ID, pct);
      App.completeModule(MODULE_ID, pct);
      App.showModuleComplete(MODULE_ID, pct);
    }

    // ===================================================
    // AJUDA
    // ===================================================
    const HELP_TEXTS = [
      {
        title: '❓ Sobre este Passo',
        body: '<p>Leia as definições com atenção. Um <strong>computador</strong> precisa de <strong>hardware</strong> (partes físicas) e <strong>software</strong> (programas) para funcionar!</p>'
      },
      {
        title: '❓ Partes Internas',
        body: '<p>As partes internas ficam <strong>dentro do gabinete</strong> (a "caixa" do computador). Você só as vê se abrir o computador!</p><ul style="margin-top:8px;"><li>⚡ CPU = processa tudo</li><li>🧠 RAM = memória rápida e temporária</li><li>💾 HD/SSD = armazena seus arquivos</li></ul>'
      },
      {
        title: '❓ Periféricos',
        body: '<p>Periféricos são dispositivos <strong>externos</strong> conectados ao computador. Podem ser de <strong>entrada</strong> (enviam dados para o computador) ou <strong>saída</strong> (recebem dados do computador).</p>'
      },
      {
        title: '❓ Como Fazer a Atividade',
        body: '<p>Arraste cada peça da coluna da esquerda para a coluna correta:</p><ul style="margin-top:8px;"><li>⚙️ <strong>Interna</strong> = fica dentro do gabinete</li><li>🖥️ <strong>Externa</strong> = fica do lado de fora (periférico)</li></ul><p style="margin-top:8px;">Se errar, veja a dica e tente de novo!</p>'
      },
      {
        title: '❓ Como Funciona o Quiz',
        body: '<p>Clique na resposta que você acha correta. O sistema vai te dizer se acertou ou errou e <strong>explicar o motivo</strong>. Não tenha medo de errar — é assim que se aprende!</p>'
      },
    ];

    function showHelp() {
      const help = HELP_TEXTS[currentStep] || HELP_TEXTS[0];
      document.getElementById('help-title').innerHTML = help.title;
      document.getElementById('help-body').innerHTML = help.body;
      document.getElementById('help-modal').classList.add('active');
    }

    function closeHelp() {
      document.getElementById('help-modal').classList.remove('active');
    }

    // ===================================================
    // INICIALIZAÇÃO
    // ===================================================
    document.addEventListener('DOMContentLoaded', () => {
      App.requireStudent();

      // Recupera progresso do módulo
      const progress = App.getModuleProgress(MODULE_ID);
      currentStep = Math.min(progress.currentStep || 0, STEPS.length - 1);

      // Restaura respostas do quiz se já fez
      if (progress.quizScore > 0) {
        // Preenche quizAnswers mockado para mostrar resultado
        for (let i = 0; i < QUIZ_QUESTIONS.length; i++) quizAnswers[i] = true;
        quizScore = Math.round((progress.quizScore / 100) * QUIZ_QUESTIONS.length);
      }

      renderCurrentStep();
    });
  </script>
</body>
</html>
