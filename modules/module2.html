<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Módulo 2 — Conhecendo o Teclado</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    body { background: var(--bg); }

    /* ===== TECLADO VIRTUAL ===== */
    .virtual-keyboard {
      background: #2A2A2A;
      border-radius: 16px;
      padding: 20px 16px 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      overflow-x: auto;
      max-width: 100%;
    }
    .keyboard-row {
      display: flex;
      gap: 5px;
      margin-bottom: 5px;
      justify-content: center;
    }
    .key {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      height: 38px;
      padding: 2px 4px;
      background: linear-gradient(180deg, #4E4E4E 0%, #3A3A3A 100%);
      border: 1px solid #666;
      border-bottom: 3px solid #1A1A1A;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 700;
      color: #E8E8E8;
      cursor: pointer;
      transition: all 0.08s ease;
      position: relative;
      font-family: 'Inter', sans-serif;
      user-select: none;
      box-sizing: border-box;
    }
    .key:hover { background: linear-gradient(180deg, #5E5E5E, #4A4A4A); }
    .key.active {
      background: linear-gradient(180deg, #4F46E5, #3730A3) !important;
      border-color: #3730A3;
      border-bottom-color: #1e1a5e;
      color: white;
      transform: translateY(2px);
      border-bottom-width: 1px;
      box-shadow: 0 0 12px rgba(79,70,229,0.5);
    }
    .key.key-fn     { background: linear-gradient(180deg, #3A3A6A, #2A2A5A); color: #A5B4FC; }
    .key.key-mod    { background: linear-gradient(180deg, #3A5A3A, #2A4A2A); color: #86EFAC; }
    .key.key-enter  { background: linear-gradient(180deg, #5A3A3A, #4A2A2A); color: #FCA5A5; }
    .key.key-space  { background: linear-gradient(180deg, #5A5A5A, #4A4A4A); }
    .key .key-top   { font-size: 9px;  line-height: 1; }
    .key .key-bot   { font-size: 11px; line-height: 1; font-weight: 800; }

    /* Tamanhos especiais */
    .key-w15  { min-width: 52px; }
    .key-w2   { min-width: 76px; }
    .key-w225 { min-width: 84px; }
    .key-w275 { min-width: 104px; }
    .key-w3   { min-width: 114px; }
    .key-w6   { min-width: 240px; }
    .key-h2   { height: 84px; }

    /* Info box da tecla */
    .key-info-box {
      background: white;
      border-radius: var(--radius-lg);
      padding: 28px;
      box-shadow: var(--shadow-lg);
      border: 2px solid var(--primary-light);
      text-align: center;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
    }
    .key-info-name {
      font-size: 28px;
      font-weight: 900;
      font-family: var(--font-heading);
      color: var(--primary);
    }
    .key-info-function {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
      max-width: 320px;
    }
    .key-info-category {
      display: inline-block;
      padding: 4px 12px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 700;
      background: var(--primary-ultra-light);
      color: var(--primary);
    }
    /* Pulse para indicar que pode digitar */
    @keyframes pulseKB {
      0%, 100% { box-shadow: 0 0 0 0 rgba(79,70,229,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(79,70,229,0); }
    }
  </style>
</head>

    // ===== PASSO 3: TECLAS IMPORTANTES =====
    function renderStep3() {
      const importantKeys = [
        { key:'Enter ↵', icon:'↵', desc:'Confirma ações, pula linhas. A tecla mais usada!', color:'red' },

      return `
        <div class="module-section">

    // ===== PASSO 5: QUIZ =====
    function renderStep5() {
      kbListenerActive = false;
      const questionIndex = Object.keys(quizAnswers).length;

      const q = QUIZ_QUESTIONS[questionIndex];

    // ===== MOSTRAR INFO DA TECLA (clique) =====
    function showKeyInfo(el) {
      const code = el.dataset.code;
      const info = KEY_INFO[code];
      const infoBox = document.getElementById('key-info');
      if (!infoBox) return;
      infoBox.innerHTML = info ? `
        <div class="key-info-name">${info.name}</div>
        <div class="key-info-category">${info.cat}</div>
        <div class="key-info-function">${info.func}</div>
      ` : `
        <div class="key-info-name">${el.textContent.trim()}</div>
        <div class="key-info-function">Tecla alfanumérica — usado para digitar texto.</div>
      `;
      App.playSound('click');
      // Highlight temporário
      document.querySelectorAll('.key.active').forEach(k => k.classList.remove('active'));
      el.classList.add('active');
      setTimeout(() => el.classList.remove('active'), 600);
      
      clickedKeys++;
      if (clickedKeys >= 3 && !stepUnlocked) {
        unlockNext();
      }
    }

    // ===== LISTENER PARA TECLAS REAIS =====
    let pressCount = 0;
    let typedText = '';
    function handleKeyDown(e) {
      if (!kbListenerActive) return;
      if (currentStep !== 3) return;

      e.preventDefault();
      const keyId = CODE_TO_KEY_ID[e.code];
      if (keyId) {
        const keyEl = document.getElementById(keyId);
        if (keyEl) {
          keyEl.classList.add('active');
          setTimeout(() => keyEl.classList.remove('active'), 300);
        }
      }

      // Atualiza info
      const info = KEY_INFO[e.code];
      const nameEl = document.getElementById('info-name');
      const funcEl = document.getElementById('info-func');
      const catEl  = document.getElementById('info-cat');
      if (nameEl) nameEl.textContent = info ? info.name : (e.key.length === 1 ? `Tecla: ${e.key.toUpperCase()}` : e.code);
      if (funcEl) funcEl.textContent = info ? info.func : 'Tecla alfanumérica — digita o caractere correspondente.';
      if (catEl)  { catEl.textContent = info ? info.cat : 'Alfanumérico'; catEl.style.display='inline-block'; }

      pressCount++;
      const cntEl = document.getElementById('press-count');
      if (cntEl) cntEl.textContent = pressCount;

      // Typing demo
      if (e.key.length === 1) {
        typedText += e.key;
      } else if (e.code === 'Backspace') {
        typedText = typedText.slice(0, -1);
      } else if (e.code === 'Space') {
        typedText += ' ';
      }
      const demoEl = document.getElementById('typing-demo');
      if (demoEl) demoEl.textContent = typedText || '';

      App.playSound('click');
      
      if (pressCount >= 5 && !stepUnlocked) {
        unlockNext();
      }
    }
    document.addEventListener('keydown', handleKeyDown);

    // ===== QUIZ =====
    function answerQuiz(qIdx, optIdx) {
      const q = QUIZ_QUESTIONS[qIdx];
      document.querySelectorAll('.quiz-option').forEach(o => o.classList.add('disabled'));
      const correct = optIdx === q.correct;
      if (correct) quizScore++;
      quizAnswers[qIdx] = { selected: optIdx, correct: q.correct };
      document.getElementById(`option-${optIdx}`).classList.add(correct ? 'correct' : 'incorrect');
      if (!correct) document.getElementById(`option-${q.correct}`).classList.add('correct');
      const fb = document.getElementById('quiz-feedback');
      fb.innerHTML = `
        <span class="quiz-feedback-icon">${correct?'✅':'❌'}</span>
        <div class="quiz-feedback-text">
          <strong>${correct?'Correto! 🎉':'Quase lá!'}</strong>
          <div style="margin-top:4px;">${!correct?`Resposta correta: <strong>${q.options[q.correct]}</strong>.<br>`:''}${q.explanation}</div>
        </div>
      `;
      fb.className = `quiz-feedback show ${correct?'correct':'incorrect'}`;
      App.playSound(correct?'correct':'incorrect');
      setTimeout(renderCurrentStep, 2200);
    }

    function finishModule() {
      const pct = Math.round((quizScore/QUIZ_QUESTIONS.length)*100);
      App.saveQuizScore(MODULE_ID, pct);
      App.completeModule(MODULE_ID, pct);
      App.showModuleComplete(MODULE_ID, pct);
    }

    function unlockNext() {
      stepUnlocked = true;
      document.getElementById('btn-next').style.display = 'inline-flex';
      App.playSound('correct');
    }

    // ===== NAVEGAÇÃO =====
    function renderCurrentStep() {
      const progress = App.getModuleProgress(MODULE_ID);
      stepUnlocked = currentStep < (progress.currentStep || 0);

      const content = document.getElementById('step-content');
      content.innerHTML = STEPS[currentStep].render();
      updateProgress();
      if (currentStep === 3) { kbListenerActive = true; pressCount = 0; typedText = ''; }
      else kbListenerActive = false;
      if (currentStep === 1) { clickedKeys = 0; }
    }

    function updateProgress() {
      let html = '';
      STEPS.forEach((_,i) => {
        html += `<div class="step-dot ${i<currentStep?'done':i===currentStep?'active':'pending'}"></div>`;
        if (i<STEPS.length-1) html += `<div class="step-line ${i<currentStep?'done':''}"></div>`;
      });
      document.getElementById('step-progress').innerHTML = html;
      document.getElementById('step-label').textContent = `Passo ${currentStep+1}/${STEPS.length}`;
      document.getElementById('footer-step').textContent = `Passo ${currentStep+1} de ${STEPS.length}: ${STEPS[currentStep].title}`;
      document.getElementById('btn-prev').style.display = currentStep>0?'inline-flex':'none';
      
      if (currentStep === STEPS.length - 1) {
        document.getElementById('btn-next').style.display = 'none';
      } else {
        document.getElementById('btn-next').style.display = stepUnlocked ? 'inline-flex' : 'none';
      }
      
      const state = App.loadState();
      if (state) document.getElementById('nav-xp').textContent = state.totalXP||0;
    }

    function nextStep() {
      if (currentStep < STEPS.length-1) {
        if (currentStep < 3) App.completeStep(MODULE_ID, currentStep, 10);
        currentStep++;
        renderCurrentStep();
        window.scrollTo({top:0,behavior:'smooth'});
        App.playSound('click');
      }
    }
    function prevStep() {
      if (currentStep>0) { currentStep--; renderCurrentStep(); window.scrollTo({top:0,behavior:'smooth'}); }
    }

    // AJUDA
    const HELPS = [
      {title:'❓ Grupos de Teclas',body:'<p>O teclado tem 6 grupos principais: alfanumérico, funções (F1-F12), modificadoras (Ctrl/Alt/Shift), navegação (setas), numérico e edição (Enter/Backspace).</p>'},
      {title:'❓ Teclado Visual',body:'<p>Clique em qualquer tecla colorida para ver o nome e a função dela explicados.</p>'},
      {title:'❓ Teclas Importantes',body:'<p>Memorize as teclas modificadoras: <strong>Shift</strong> (maiúsculas), <strong>Ctrl</strong> (atalhos), <strong>Alt</strong> (mais atalhos), <strong>Windows</strong> (menu iniciar).</p>'},
      {title:'❓ Simulador',body:'<p>Pressione as teclas do seu teclado REAL! O teclado virtual vai iluminar a tecla e explicar sua função. Tente as setas, Shift, Ctrl, Enter...</p>'},
      {title:'❓ Quiz',body:'<p>Clique na resposta correta. Mesmo que erre, veja a explicação — é assim que o aprendizado acontece!</p>'},
    ];
    function showHelp() {
      const h = HELPS[currentStep]||HELPS[0];
      document.getElementById('help-title').innerHTML = h.title;
      document.getElementById('help-body').innerHTML = h.body;
      document.getElementById('help-modal').classList.add('active');
    }
    function closeHelp() { document.getElementById('help-modal').classList.remove('active'); }

    document.addEventListener('DOMContentLoaded', () => {
      App.requireStudent();
      const progress = App.getModuleProgress(MODULE_ID);
      currentStep = Math.min(progress.currentStep||0, STEPS.length-1);
      if (progress.quizScore>0) { for(let i=0;i<QUIZ_QUESTIONS.length;i++) quizAnswers[i]=true; quizScore=Math.round((progress.quizScore/100)*QUIZ_QUESTIONS.length); }
      renderCurrentStep();
    });
  </script>
</body>
